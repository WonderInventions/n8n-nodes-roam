# Lints and builds the package on every pull request and on pushes to master.
# This is the status check enforced by branch protection on `master`.

name: CI

on:
  pull_request:
  push:
    branches: [master]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Don't leave the GITHUB_TOKEN in the local git config after checkout.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run build
