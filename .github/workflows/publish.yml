# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires all community nodes to be published via
# GitHub Actions with npm provenance statements. This workflow satisfies that
# requirement. Provenance lets anyone cryptographically verify that a package
# was built by this exact workflow, from this exact repository and commit.
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# @n8n/node-cli >= 0.23.0 is required. Earlier versions do not support the
# provenance flag passed by `npm run release` in CI, and the publish step will
# fail. Check the version installed in this project with:
#
#   npm list @n8n/node-cli
#
# To upgrade, add @n8n/node-cli@latest as a dev dependency.
#
# ─── ONE-TIME SETUP (OIDC Trusted Publishing — no tokens, no stored secrets) ────
#
#   1. Log in to npmjs.com and open the n8n-nodes-roam package settings.
#   2. Under "Publish access" -> "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: WonderInventions
#        Repository name:  n8n-nodes-roam
#        Workflow name:    publish.yml
#        Environment:      (leave blank)
#   4. Leave NPM_TOKEN unset. GitHub's OIDC token is exchanged for short-lived
#      publish credentials — no long-lived secret ever touches the repo.
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Run `npm run release` locally (from the `main` branch) to lint, build, bump
# the version, update the changelog, commit, tag, and push. The pushed `v*.*.*`
# tag triggers this workflow, which publishes to npm with provenance.

name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default (write) for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Don't leave the GITHUB_TOKEN in the local git config after checkout.
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        # In CI, `n8n-node release` runs lint + build, then publishes with
        # NPM_CONFIG_PROVENANCE=true (requires id-token: write above).
        #
        # Auth is npm OIDC trusted publishing — no NPM_TOKEN, no stored secrets.
        # The trusted publisher is configured on npmjs.com for this repo +
        # workflow (Settings -> Trusted Publishers).
        run: npm run release
